name: Smoke

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Build once, share via artifact ───────────────────────────────────────
  build-open62541:
    name: Build open62541
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build open62541
        uses: docker/build-push-action@v7
        with:
          context: open62541
          file: open62541/Dockerfile
          push: false
          load: true
          tags: ghcr.io/otfabric/opcua-interop-open62541:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image
        run: docker save ghcr.io/otfabric/opcua-interop-open62541:smoke | gzip > /tmp/open62541.tar.gz

      - uses: actions/upload-artifact@v7
        with:
          name: smoke-image-open62541
          path: /tmp/open62541.tar.gz
          retention-days: 1

  build-milo:
    name: Build Milo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Milo
        uses: docker/build-push-action@v7
        with:
          context: milo
          file: milo/Dockerfile
          push: false
          load: true
          tags: ghcr.io/otfabric/opcua-interop-milo:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image
        run: docker save ghcr.io/otfabric/opcua-interop-milo:smoke | gzip > /tmp/milo.tar.gz

      - uses: actions/upload-artifact@v7
        with:
          name: smoke-image-milo
          path: /tmp/milo.tar.gz
          retention-days: 1

  # ── Self-smoke: each stack tested in isolation ────────────────────────────
  smoke-open62541:
    name: open62541 smoke
    runs-on: ubuntu-latest
    needs: build-open62541
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          name: smoke-image-open62541
          path: /tmp

      - name: Load image
        run: docker load < /tmp/open62541.tar.gz

      - name: Run open62541 smoke test
        run: scripts/smoke.sh open62541 ghcr.io/otfabric/opcua-interop-open62541:smoke

      - name: Test graceful shutdown
        run: scripts/shutdown-test.sh open62541 ghcr.io/otfabric/opcua-interop-open62541:smoke

  smoke-milo:
    name: Milo smoke
    runs-on: ubuntu-latest
    needs: build-milo
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          name: smoke-image-milo
          path: /tmp

      - name: Load image
        run: docker load < /tmp/milo.tar.gz

      - name: Run Milo smoke test
        run: scripts/smoke.sh milo ghcr.io/otfabric/opcua-interop-milo:smoke

      - name: Test graceful shutdown
        run: scripts/shutdown-test.sh milo ghcr.io/otfabric/opcua-interop-milo:smoke

  # ── Cross-stack: only runs after both self-smokes pass ───────────────────
  smoke-cross-stack:
    name: Cross-stack smoke
    runs-on: ubuntu-latest
    needs: [smoke-open62541, smoke-milo]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          name: smoke-image-open62541
          path: /tmp

      - uses: actions/download-artifact@v8
        with:
          name: smoke-image-milo
          path: /tmp

      - name: Load images
        run: |
          docker load < /tmp/open62541.tar.gz
          docker load < /tmp/milo.tar.gz

      - name: Cross-stack smoke
        run: |
          scripts/smoke.sh cross \
            ghcr.io/otfabric/opcua-interop-open62541:smoke \
            ghcr.io/otfabric/opcua-interop-milo:smoke
