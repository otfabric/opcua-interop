name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read
  packages: write

jobs:
  release:
    name: Build and publish release images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse version tags
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"                  # e.g. v0.1.0
          MAJOR="${TAG%%.*}"                        # e.g. v0
          MINOR="${TAG%.*}"                         # e.g. v0.1
          echo "tag=${TAG}"     >> "$GITHUB_OUTPUT"
          echo "major=${MAJOR}" >> "$GITHUB_OUTPUT"
          echo "minor=${MINOR}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate fixtures
        run: |
          pip install check-jsonschema
          scripts/validate-fixtures.sh

      - name: Build and push open62541
        uses: docker/build-push-action@v6
        with:
          context: open62541
          file: open62541/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/otfabric/opcua-interop-open62541:${{ steps.version.outputs.tag }}
            ghcr.io/otfabric/opcua-interop-open62541:${{ steps.version.outputs.minor }}
            ghcr.io/otfabric/opcua-interop-open62541:${{ steps.version.outputs.major }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Milo
        uses: docker/build-push-action@v6
        with:
          context: milo
          file: milo/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/otfabric/opcua-interop-milo:${{ steps.version.outputs.tag }}
            ghcr.io/otfabric/opcua-interop-milo:${{ steps.version.outputs.minor }}
            ghcr.io/otfabric/opcua-interop-milo:${{ steps.version.outputs.major }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM (open62541)
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/otfabric/opcua-interop-open62541:${{ steps.version.outputs.tag }}
          artifact-name: sbom-open62541-${{ steps.version.outputs.tag }}.spdx.json
          output-file: /tmp/sbom-open62541.spdx.json

      - name: Generate SBOM (Milo)
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/otfabric/opcua-interop-milo:${{ steps.version.outputs.tag }}
          artifact-name: sbom-milo-${{ steps.version.outputs.tag }}.spdx.json
          output-file: /tmp/sbom-milo.spdx.json

      - name: Scan open62541 image
        uses: anchore/scan-action@v4
        with:
          image: ghcr.io/otfabric/opcua-interop-open62541:${{ steps.version.outputs.tag }}
          fail-build: false
          severity-cutoff: critical

      - name: Scan Milo image
        uses: anchore/scan-action@v4
        with:
          image: ghcr.io/otfabric/opcua-interop-milo:${{ steps.version.outputs.tag }}
          fail-build: false
          severity-cutoff: critical

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            /tmp/sbom-open62541.spdx.json
            /tmp/sbom-milo.spdx.json
