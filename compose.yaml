services:
  open62541:
    image: ghcr.io/otfabric/opcua-compat-open62541:${OPCUA_COMPAT_VERSION:-dev}
    command:
      - server
      - --fixture
      - /fixtures/baseline/fixture.json
      - --endpoint
      - opc.tcp://0.0.0.0:4840/opcua-compat
      - --pki-dir
      - /pki
      - --ready-file
      - /run/opcua-compat/ready
    ports:
      - "4840:4840"
    volumes:
      - ./fixtures:/fixtures:ro
      - ./certs/test-pki:/pki:ro
    healthcheck:
      test: ["CMD", "test", "-f", "/run/opcua-compat/ready"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s
    environment:
      OPCUA_LOG_LEVEL: ${OPCUA_LOG_LEVEL:-info}

  milo:
    image: ghcr.io/otfabric/opcua-compat-milo:${OPCUA_COMPAT_VERSION:-dev}
    command:
      - server
      - --fixture
      - /fixtures/baseline/fixture.json
      - --endpoint
      - opc.tcp://0.0.0.0:4840/opcua-compat
      - --pki-dir
      - /pki
      - --ready-file
      - /run/opcua-compat/ready
    ports:
      - "4841:4840"
    volumes:
      - ./fixtures:/fixtures:ro
      - ./certs/test-pki:/pki:ro
    healthcheck:
      test: ["CMD", "test", "-f", "/run/opcua-compat/ready"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 10s
    environment:
      OPCUA_LOG_LEVEL: ${OPCUA_LOG_LEVEL:-info}
